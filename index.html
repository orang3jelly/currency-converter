<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css"
        integrity="sha512-NhSC1YmyruXifcj/KFRWoC561YpHpc5Jtzgvbuzx5VozKpWvQ+4nXhPdFgmx8xqexRcpAglTj9sIBWINXa8x5w=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="images/money.gif" rel="icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:ital@0;1&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="css/style.css" rel="stylesheet">
    <link href="css/form.css" rel="stylesheet">
    <script defer src="js/script.js"></script>
    <title>Kalkulator walut</title>
</head>

<body class="body">
    <form class="form js-form">
        <fieldset class="form__fieldset">
            <legend class="form__legend">Kalkulator walut</legend>
            <p>
                <label>
                    <span class="form__labelName">Podaj kwotę w PLN:*</span>
                    <input class="form__labelInput js-inputPLN" name="amount" placeholder="Kwota w PLN" type="number"
                        required autofocus min="0" step="0.01">
                </label>
            </p>
            <p>
                <label>
                    <span class="form__labelName">Wybierz walutę:</span>
                    <select class="form__labelInput js-selectCurrency" name="selectCurrency">
                        <option value="EUR">EURO (EUR)</option>
                        <option value="USD">DOLAR AMERYKAŃSKI (USD)</option>
                        <option value="CHF">FRANK SZWAJCARSKI (CHF)</option>
                        <option value="GBP">FUNT BRYTYJSKI (GBP)</option>
                    </select>
                </label>
            </p>
            <p class="form__operation">
                Wynik przeliczenia: <strong class="js-operation">N/A</strong>
            </p>
            <p>
                <button class="form__button">Wykonaj obliczenia</button>
            </p>

        </fieldset>
        <p class="form__paragraph">
            <strong class="form__message">*Pole wymagane</strong>
        </p>
    </form>

</body>

</html>
